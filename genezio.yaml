name: Langchain-agent
region: us-east-1
yamlVersion: 2

backend:
  path: server/agent
  language:
    name: ts
    packageManager: npm
  functions:
    - name: agent
      path: .
      entry: src/index.ts
      handler: handler

frontend:
  path: client
  publish: dist
  scripts:
    deploy: npm install
    build: npm run build
    start: npm install && npm run dev